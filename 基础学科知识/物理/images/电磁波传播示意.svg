<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <rect width="1120" height="620" fill="#fbfbfd"/>
  <text x="560" y="44" text-anchor="middle" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">电磁波传播：变化电场和变化磁场相互支撑</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <line x1="130" y1="310" x2="960" y2="310" stroke="#5f6368" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="980" y="316" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">传播方向</text>

  <path d="M140 310 C190 120, 240 500, 290 310 S390 120, 440 310 S540 500, 590 310 S690 120, 740 310 S840 500, 890 310" fill="none" stroke="#1e88e5" stroke-width="5"/>
  <text x="270" y="120" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" fill="#1e88e5">电场 E 振荡</text>

  <path d="M140 310 C190 235, 240 385, 290 310 S390 235, 440 310 S540 385, 590 310 S690 235, 740 310 S840 385, 890 310" fill="none" stroke="#8e24aa" stroke-width="5" stroke-dasharray="12 9"/>
  <text x="690" y="440" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" fill="#8e24aa">磁场 B 振荡</text>

  <line x1="260" y1="310" x2="260" y2="190" stroke="#1e88e5" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="280" y="205" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#1e88e5">电场方向</text>

  <line x1="260" y1="310" x2="342" y2="390" stroke="#8e24aa" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="350" y="402" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#8e24aa">磁场方向</text>

  <rect x="120" y="485" width="880" height="78" rx="18" fill="#ffffff" stroke="#f9a825" stroke-width="3"/>
  <text x="560" y="518" text-anchor="middle" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">电磁波不需要空气或导线作为介质，能在真空中传播。</text>
  <text x="560" y="548" text-anchor="middle" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">光、无线电波、微波、红外线、紫外线、X 射线都属于电磁波，只是频率不同。</text>
</svg>
