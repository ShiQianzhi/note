<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <rect width="1120" height="620" fill="#fbfbfd"/>
  <text x="560" y="42" text-anchor="middle" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">标准模型中的微观粒子分类</text>

  <text x="205" y="95" text-anchor="middle" font-size="23" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">费米子：组成物质</text>
  <text x="800" y="95" text-anchor="middle" font-size="23" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">玻色子：传递相互作用</text>

  <rect x="60" y="120" width="290" height="380" rx="18" fill="#e3f2fd" stroke="#1e88e5" stroke-width="4"/>
  <text x="205" y="158" text-anchor="middle" font-size="21" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">夸克 Quarks</text>
  <text x="205" y="190" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">参与强相互作用，组成质子和中子</text>

  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#202124">
    <rect x="92" y="225" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="137" y="258" text-anchor="middle">上 u</text>
    <rect x="226" y="225" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="271" y="258" text-anchor="middle">下 d</text>
    <rect x="92" y="300" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="137" y="333" text-anchor="middle">粲 c</text>
    <rect x="226" y="300" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="271" y="333" text-anchor="middle">奇 s</text>
    <rect x="92" y="375" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="137" y="408" text-anchor="middle">顶 t</text>
    <rect x="226" y="375" width="90" height="52" rx="12" fill="#ffffff" stroke="#1e88e5" stroke-width="2"/>
    <text x="271" y="408" text-anchor="middle">底 b</text>
  </g>

  <rect x="390" y="120" width="290" height="380" rx="18" fill="#f3e5f5" stroke="#8e24aa" stroke-width="4"/>
  <text x="535" y="158" text-anchor="middle" font-size="21" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">轻子 Leptons</text>
  <text x="535" y="190" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">电子属于轻子，不参与强相互作用</text>
  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#202124">
    <rect x="422" y="225" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="472" y="258" text-anchor="middle">电子 e</text>
    <rect x="548" y="225" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="598" y="258" text-anchor="middle">电子中微子</text>
    <rect x="422" y="300" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="472" y="333" text-anchor="middle">μ 子</text>
    <rect x="548" y="300" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="598" y="333" text-anchor="middle">μ 中微子</text>
    <rect x="422" y="375" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="472" y="408" text-anchor="middle">τ 子</text>
    <rect x="548" y="375" width="100" height="52" rx="12" fill="#ffffff" stroke="#8e24aa" stroke-width="2"/>
    <text x="598" y="408" text-anchor="middle">τ 中微子</text>
  </g>

  <rect x="730" y="120" width="330" height="260" rx="18" fill="#fff8e1" stroke="#f9a825" stroke-width="4"/>
  <text x="895" y="158" text-anchor="middle" font-size="21" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">规范玻色子 Gauge Bosons</text>
  <text x="895" y="190" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">负责传递基本相互作用</text>
  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#202124">
    <rect x="762" y="225" width="115" height="52" rx="12" fill="#ffffff" stroke="#f9a825" stroke-width="2"/>
    <text x="819" y="258" text-anchor="middle">光子 γ</text>
    <rect x="902" y="225" width="115" height="52" rx="12" fill="#ffffff" stroke="#f9a825" stroke-width="2"/>
    <text x="959" y="258" text-anchor="middle">胶子 g</text>
    <rect x="762" y="300" width="115" height="52" rx="12" fill="#ffffff" stroke="#f9a825" stroke-width="2"/>
    <text x="819" y="333" text-anchor="middle">W± 玻色子</text>
    <rect x="902" y="300" width="115" height="52" rx="12" fill="#ffffff" stroke="#f9a825" stroke-width="2"/>
    <text x="959" y="333" text-anchor="middle">Z 玻色子</text>
  </g>

  <rect x="730" y="410" width="330" height="90" rx="18" fill="#e8f5e9" stroke="#43a047" stroke-width="4"/>
  <text x="895" y="448" text-anchor="middle" font-size="21" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">希格斯玻色子 Higgs Boson</text>
  <text x="895" y="478" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">与基本粒子质量来源有关</text>

  <text x="560" y="570" text-anchor="middle" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">日常物质主要由上夸克、下夸克、电子，以及传递电磁作用的光子等共同解释。</text>
</svg>
