<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560">
  <rect width="1080" height="560" fill="#fbfbfd"/>
  <text x="540" y="42" text-anchor="middle" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">原子核内部：质子、中子和夸克</text>

  <circle cx="210" cy="275" r="118" fill="#fff8e1" stroke="#f9a825" stroke-width="4"/>
  <circle cx="172" cy="245" r="34" fill="#e53935"/>
  <text x="172" y="253" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">p</text>
  <circle cx="238" cy="246" r="34" fill="#757575"/>
  <text x="238" y="254" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">n</text>
  <circle cx="203" cy="310" r="34" fill="#e53935"/>
  <text x="203" y="318" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">p</text>
  <circle cx="270" cy="314" r="34" fill="#757575"/>
  <text x="270" y="322" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">n</text>
  <text x="210" y="430" text-anchor="middle" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">原子核</text>
  <text x="210" y="458" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">质子 p + 中子 n</text>

  <line x1="330" y1="275" x2="430" y2="215" stroke="#5f6368" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="330" y1="275" x2="430" y2="335" stroke="#5f6368" stroke-width="3" marker-end="url(#arrow)"/>

  <circle cx="545" cy="200" r="82" fill="#ffebee" stroke="#e53935" stroke-width="4"/>
  <circle cx="515" cy="190" r="26" fill="#fb8c00"/>
  <text x="515" y="198" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">u</text>
  <circle cx="575" cy="190" r="26" fill="#fb8c00"/>
  <text x="575" y="198" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">u</text>
  <circle cx="545" cy="236" r="26" fill="#8e24aa"/>
  <text x="545" y="244" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">d</text>
  <text x="545" y="310" text-anchor="middle" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">质子</text>
  <text x="545" y="338" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">uud，带 +1 电荷</text>

  <circle cx="545" cy="395" r="82" fill="#f5f5f5" stroke="#757575" stroke-width="4"/>
  <circle cx="515" cy="385" r="26" fill="#fb8c00"/>
  <text x="515" y="393" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">u</text>
  <circle cx="575" cy="385" r="26" fill="#8e24aa"/>
  <text x="575" y="393" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">d</text>
  <circle cx="545" cy="431" r="26" fill="#8e24aa"/>
  <text x="545" y="439" text-anchor="middle" font-size="22" font-family="Arial" fill="#fff">d</text>
  <text x="735" y="392" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">中子</text>
  <text x="735" y="420" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">udd，整体不带电</text>

  <rect x="765" y="155" width="250" height="160" rx="18" fill="#e8f5e9" stroke="#43a047" stroke-width="4"/>
  <text x="890" y="195" text-anchor="middle" font-size="21" font-family="Arial, 'PingFang SC', sans-serif" fill="#202124">强相互作用</text>
  <text x="890" y="230" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">把夸克束缚成质子和中子</text>
  <text x="890" y="260" text-anchor="middle" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" fill="#5f6368">也把质子、中子束缚成原子核</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#5f6368"/>
    </marker>
  </defs>
</svg>
