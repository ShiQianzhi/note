<svg width="1280" height="680" viewBox="0 0 1280 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">二级索引查询并回表执行时序图</title>
  <desc id="desc">展示通过二级索引 uk_order_no 找到主键，再回到聚簇索引读取完整行的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#64748B}
      .box{fill:#fff;stroke:#CBD5E1;stroke-width:1.5;filter:url(#shadow)}.hot{fill:#EFF6FF;stroke:#93C5FD}.store{fill:#FFF7ED;stroke:#FDBA74}
      .h{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.t{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#475569}.n{font:700 14px Arial,sans-serif;fill:#2563EB}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.note{fill:#F8FAFC;stroke:#E2E8F0}
    </style>
  </defs>
  <rect width="1280" height="680" rx="28" fill="#F8FAFC"/>
  <text x="640" y="54" text-anchor="middle" class="title">二级索引查询并回表：WHERE order_no = ...</text>
  <text x="640" y="84" text-anchor="middle" class="sub">二级索引叶子节点保存主键值，查询完整行时需要再访问聚簇索引</text>

  <rect x="70" y="135" width="145" height="88" rx="16" class="box"/><text x="143" y="170" text-anchor="middle" class="h">Client</text><text x="143" y="198" text-anchor="middle" class="t">订单号查询</text>
  <rect x="255" y="135" width="160" height="88" rx="16" class="box"/><text x="335" y="170" text-anchor="middle" class="h">MySQL Server</text><text x="335" y="198" text-anchor="middle" class="t">解析/权限/优化</text>
  <rect x="455" y="135" width="140" height="88" rx="16" class="hot"/><text x="525" y="170" text-anchor="middle" class="h">Optimizer</text><text x="525" y="198" text-anchor="middle" class="t">选 uk_order_no</text>
  <rect x="635" y="135" width="140" height="88" rx="16" class="box"/><text x="705" y="170" text-anchor="middle" class="h">Executor</text><text x="705" y="198" text-anchor="middle" class="t">index_lookup</text>
  <rect x="815" y="110" width="150" height="78" rx="16" class="store"/><text x="890" y="142" text-anchor="middle" class="h">二级索引</text><text x="890" y="168" text-anchor="middle" class="t">返回主键 id</text>
  <rect x="815" y="225" width="150" height="78" rx="16" class="store"/><text x="890" y="257" text-anchor="middle" class="h">聚簇索引</text><text x="890" y="283" text-anchor="middle" class="t">读取完整行</text>
  <rect x="1010" y="168" width="150" height="78" rx="16" class="store"/><text x="1085" y="200" text-anchor="middle" class="h">Buffer Pool</text><text x="1085" y="226" text-anchor="middle" class="t">缓存数据页</text>

  <path d="M215 179H255" class="line"/><path d="M415 179H455" class="line"/><path d="M595 179H635" class="line"/><path d="M775 170H815" class="line"/>
  <path d="M890 188V225" class="line"/><path d="M965 264H1010" class="line"/><path d="M1010 207H965" class="line"/>

  <rect x="115" y="355" width="1050" height="220" rx="22" class="note"/>
  <text x="160" y="400" class="n">1</text><text x="185" y="400" class="t">优化器选择唯一二级索引 `uk_order_no`，先按订单号定位索引记录。</text>
  <text x="160" y="435" class="n">2</text><text x="185" y="435" class="t">二级索引叶子节点返回对应主键 `id`，此时还没有完整行数据。</text>
  <text x="160" y="470" class="n">3</text><text x="185" y="470" class="t">InnoDB 使用主键 `id` 回到聚簇索引读取完整行，这一步就是回表。</text>
  <text x="160" y="505" class="n">4</text><text x="185" y="505" class="t">如果查询字段被二级索引覆盖，可以跳过回表，减少随机 IO 和 Buffer Pool 压力。</text>
  <text x="160" y="540" class="n">5</text><text x="185" y="540" class="t">执行器完成字段投影和过滤后，把结果返回客户端。</text>
  <text x="640" y="625" text-anchor="middle" class="sub">性能关注：二级索引选择性、回表次数、覆盖索引、Buffer Pool 命中率</text>
</svg>
