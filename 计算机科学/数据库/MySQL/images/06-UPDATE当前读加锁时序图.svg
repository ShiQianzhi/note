<svg width="1280" height="700" viewBox="0 0 1280 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UPDATE 当前读与加锁执行时序图</title>
  <desc id="desc">展示库存扣减 UPDATE 通过唯一索引定位记录、请求行锁、修改数据并写入日志的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#64748B}
      .box{fill:#fff;stroke:#CBD5E1;stroke-width:1.5;filter:url(#shadow)}.hot{fill:#EFF6FF;stroke:#93C5FD}.store{fill:#FFF7ED;stroke:#FDBA74}.lock{fill:#FEF2F2;stroke:#FCA5A5}.log{fill:#F0FDF4;stroke:#86EFAC}
      .h{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.t{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#475569}.n{font:700 14px Arial,sans-serif;fill:#2563EB}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.note{fill:#F8FAFC;stroke:#E2E8F0}
    </style>
  </defs>
  <rect width="1280" height="700" rx="28" fill="#F8FAFC"/>
  <text x="640" y="54" text-anchor="middle" class="title">UPDATE 当前读与加锁：库存扣减</text>
  <text x="640" y="84" text-anchor="middle" class="sub">UPDATE 是当前读，会读取最新记录并对命中索引记录加锁</text>

  <rect x="65" y="125" width="135" height="82" rx="16" class="box"/><text x="133" y="158" text-anchor="middle" class="h">Client</text><text x="133" y="184" text-anchor="middle" class="t">UPDATE</text>
  <rect x="235" y="125" width="155" height="82" rx="16" class="box"/><text x="313" y="158" text-anchor="middle" class="h">Server</text><text x="313" y="184" text-anchor="middle" class="t">解析优化</text>
  <rect x="425" y="125" width="160" height="82" rx="16" class="hot"/><text x="505" y="158" text-anchor="middle" class="h">uk_product_id</text><text x="505" y="184" text-anchor="middle" class="t">唯一定位</text>
  <rect x="620" y="125" width="145" height="82" rx="16" class="lock"/><text x="693" y="158" text-anchor="middle" class="h">Lock Manager</text><text x="693" y="184" text-anchor="middle" class="t">请求记录锁</text>
  <rect x="800" y="90" width="150" height="72" rx="16" class="store"/><text x="875" y="121" text-anchor="middle" class="h">判断条件</text><text x="875" y="146" text-anchor="middle" class="t">quantity &gt; 0</text>
  <rect x="800" y="205" width="150" height="72" rx="16" class="store"/><text x="875" y="236" text-anchor="middle" class="h">修改内存页</text><text x="875" y="261" text-anchor="middle" class="t">扣减库存</text>
  <rect x="990" y="90" width="150" height="72" rx="16" class="log"/><text x="1065" y="121" text-anchor="middle" class="h">Undo Log</text><text x="1065" y="146" text-anchor="middle" class="t">旧版本</text>
  <rect x="990" y="205" width="150" height="72" rx="16" class="log"/><text x="1065" y="236" text-anchor="middle" class="h">Redo/Binlog</text><text x="1065" y="261" text-anchor="middle" class="t">提交日志</text>

  <path d="M200 166H235" class="line"/><path d="M390 166H425" class="line"/><path d="M585 166H620" class="line"/><path d="M765 150C780 130 785 126 800 126" class="line"/><path d="M875 162V205" class="line"/><path d="M950 126H990" class="line"/><path d="M950 241H990" class="line"/>

  <rect x="115" y="360" width="1050" height="215" rx="22" class="note"/>
  <text x="160" y="403" class="n">1</text><text x="185" y="403" class="t">优化器选择 `uk_product_id`，将锁范围收敛到单条库存记录。</text>
  <text x="160" y="438" class="n">2</text><text x="185" y="438" class="t">InnoDB 当前读最新记录，并向 Lock Manager 请求排他记录锁。</text>
  <text x="160" y="473" class="n">3</text><text x="185" y="473" class="t">锁可获得时判断 `quantity &gt; 0`，成立则写 Undo、修改内存页。</text>
  <text x="160" y="508" class="n">4</text><text x="185" y="508" class="t">写 redo prepare、binlog、redo commit；锁会在事务提交或回滚时释放。</text>
  <text x="160" y="543" class="n">5</text><text x="185" y="543" class="t">锁被占用时会等待或超时，热点库存会形成明显行锁竞争。</text>
  <text x="640" y="635" text-anchor="middle" class="sub">性能关注：唯一索引、锁范围、热点行、事务时长、批量更新和死锁</text>
</svg>
