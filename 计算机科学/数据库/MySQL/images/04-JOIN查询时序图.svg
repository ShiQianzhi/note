<svg width="1280" height="680" viewBox="0 0 1280 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">多表 JOIN 查询执行时序图</title>
  <desc id="desc">展示 orders 做驱动表，逐行按 user_id 到 users 主键索引查询并组合结果的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#64748B}
      .box{fill:#fff;stroke:#CBD5E1;stroke-width:1.5;filter:url(#shadow)}.hot{fill:#EFF6FF;stroke:#93C5FD}.store{fill:#FFF7ED;stroke:#FDBA74}.join{fill:#F0FDF4;stroke:#86EFAC}
      .h{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.t{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#475569}.n{font:700 14px Arial,sans-serif;fill:#2563EB}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.note{fill:#F8FAFC;stroke:#E2E8F0}
    </style>
  </defs>
  <rect width="1280" height="680" rx="28" fill="#F8FAFC"/>
  <text x="640" y="54" text-anchor="middle" class="title">多表 JOIN：订单关联用户</text>
  <text x="640" y="84" text-anchor="middle" class="sub">优化器要决定驱动表；JOIN 性能取决于每一步访问的数据量是否可控</text>

  <rect x="70" y="130" width="150" height="90" rx="16" class="box"/><text x="145" y="165" text-anchor="middle" class="h">Client</text><text x="145" y="193" text-anchor="middle" class="t">发送 JOIN</text>
  <rect x="260" y="130" width="170" height="90" rx="16" class="hot"/><text x="345" y="165" text-anchor="middle" class="h">Optimizer</text><text x="345" y="193" text-anchor="middle" class="t">估算成本</text>
  <rect x="470" y="130" width="190" height="90" rx="16" class="store"/><text x="565" y="165" text-anchor="middle" class="h">orders 驱动表</text><text x="565" y="193" text-anchor="middle" class="t">过滤 status/date</text>
  <rect x="700" y="130" width="170" height="90" rx="16" class="store"/><text x="785" y="165" text-anchor="middle" class="h">users 主键</text><text x="785" y="193" text-anchor="middle" class="t">按 user_id 查找</text>
  <rect x="910" y="130" width="150" height="90" rx="16" class="join"/><text x="985" y="165" text-anchor="middle" class="h">组合结果</text><text x="985" y="193" text-anchor="middle" class="t">投影字段</text>
  <rect x="1100" y="130" width="135" height="90" rx="16" class="box"/><text x="1168" y="165" text-anchor="middle" class="h">Client</text><text x="1168" y="193" text-anchor="middle" class="t">返回结果</text>
  <rect x="470" y="275" width="590" height="76" rx="16" class="join"/><text x="765" y="307" text-anchor="middle" class="h">循环执行</text><text x="765" y="333" text-anchor="middle" class="t">每取一条订单，根据 user_id 到 users.PRIMARY 查一行，再组合输出</text>

  <path d="M220 175H260" class="line"/><path d="M430 175H470" class="line"/><path d="M660 175H700" class="line"/><path d="M870 175H910" class="line"/><path d="M1060 175H1100" class="line"/>
  <path d="M565 220V275" class="line"/><path d="M785 275V220" class="line"/>

  <rect x="115" y="395" width="1050" height="180" rx="22" class="note"/>
  <text x="160" y="438" class="n">1</text><text x="185" y="438" class="t">优化器估算 `orders` 过滤后更小，因此选择订单表作为驱动表。</text>
  <text x="160" y="473" class="n">2</text><text x="185" y="473" class="t">`orders` 通过 `(status, created_at, user_id)` 过滤和排序，尽量减少驱动行数。</text>
  <text x="160" y="508" class="n">3</text><text x="185" y="508" class="t">每条订单按 `users.id` 主键查用户，要求被驱动表关联字段必须有索引。</text>
  <text x="160" y="543" class="n">4</text><text x="185" y="543" class="t">如果驱动表过大或被驱动表无索引，JOIN 会放大为大量随机查找或大中间结果。</text>
  <text x="640" y="625" text-anchor="middle" class="sub">性能关注：驱动表大小、关联字段索引、JOIN 字段类型、ORDER BY 是否可利用索引</text>
</svg>
