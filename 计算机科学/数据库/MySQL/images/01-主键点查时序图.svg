<svg width="1280" height="680" viewBox="0 0 1280 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">主键点查执行时序图</title>
  <desc id="desc">展示主键点查从客户端到连接层、解析器、优化器、执行器、InnoDB、Buffer Pool 和磁盘的执行链路。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#64748B}
      .box{fill:#fff;stroke:#CBD5E1;stroke-width:1.5;filter:url(#shadow)}.hot{fill:#EFF6FF;stroke:#93C5FD}.store{fill:#FFF7ED;stroke:#FDBA74}
      .h{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.t{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#475569}.n{font:700 14px Arial,sans-serif;fill:#2563EB}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.note{fill:#F8FAFC;stroke:#E2E8F0}
    </style>
  </defs>
  <rect width="1280" height="680" rx="28" fill="#F8FAFC"/>
  <text x="640" y="54" text-anchor="middle" class="title">主键点查：SELECT ... WHERE id = 1001</text>
  <text x="640" y="84" text-anchor="middle" class="sub">访问路径短，核心成本在主键索引定位、Buffer Pool 命中和结果返回</text>

  <rect x="50" y="140" width="135" height="90" rx="16" class="box"/><text x="118" y="175" text-anchor="middle" class="h">Client</text><text x="118" y="203" text-anchor="middle" class="t">发送 SQL</text>
  <rect x="220" y="140" width="145" height="90" rx="16" class="box"/><text x="293" y="175" text-anchor="middle" class="h">连接管理器</text><text x="293" y="203" text-anchor="middle" class="t">会话与权限</text>
  <rect x="400" y="140" width="125" height="90" rx="16" class="box"/><text x="463" y="175" text-anchor="middle" class="h">Parser</text><text x="463" y="203" text-anchor="middle" class="t">解析 SQL</text>
  <rect x="560" y="140" width="145" height="90" rx="16" class="hot"/><text x="633" y="175" text-anchor="middle" class="h">Optimizer</text><text x="633" y="203" text-anchor="middle" class="t">选择 PRIMARY</text>
  <rect x="740" y="140" width="135" height="90" rx="16" class="box"/><text x="808" y="175" text-anchor="middle" class="h">Executor</text><text x="808" y="203" text-anchor="middle" class="t">执行计划</text>
  <rect x="910" y="140" width="135" height="90" rx="16" class="store"/><text x="978" y="175" text-anchor="middle" class="h">InnoDB</text><text x="978" y="203" text-anchor="middle" class="t">主键查找</text>
  <rect x="1080" y="120" width="145" height="70" rx="16" class="store"/><text x="1153" y="151" text-anchor="middle" class="h">Buffer Pool</text><text x="1153" y="176" text-anchor="middle" class="t">索引页/数据页</text>
  <rect x="1080" y="230" width="145" height="70" rx="16" class="box"/><text x="1153" y="261" text-anchor="middle" class="h">Disk</text><text x="1153" y="286" text-anchor="middle" class="t">未命中时读取</text>

  <path d="M185 185H220" class="line"/><path d="M365 185H400" class="line"/><path d="M525 185H560" class="line"/><path d="M705 185H740" class="line"/><path d="M875 185H910" class="line"/><path d="M1045 175H1080" class="line"/>
  <path d="M1153 190V230" class="line"/>

  <rect x="115" y="355" width="1050" height="220" rx="22" class="note"/>
  <text x="160" y="400" class="n">1</text><text x="185" y="400" class="t">Client 发送主键等值查询，请求进入连接管理器。</text>
  <text x="160" y="435" class="n">2</text><text x="185" y="435" class="t">Parser 生成语法树，Optimizer 识别 `id = 1001`，选择 PRIMARY 主键索引。</text>
  <text x="160" y="470" class="n">3</text><text x="185" y="470" class="t">Executor 调用 InnoDB 的主键读取接口，InnoDB 定位聚簇索引页。</text>
  <text x="160" y="505" class="n">4</text><text x="185" y="505" class="t">Buffer Pool 命中则直接返回；未命中才从磁盘读取页并放入缓存。</text>
  <text x="160" y="540" class="n">5</text><text x="185" y="540" class="t">执行器组装结果集，连接层返回给客户端。</text>
  <text x="640" y="625" text-anchor="middle" class="sub">性能关注：PRIMARY 是否命中、Buffer Pool 命中率、返回字段数量、连接和网络延迟</text>
</svg>
