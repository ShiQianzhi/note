<svg width="1280" height="680" viewBox="0 0 1280 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">范围查询、排序与分页执行时序图</title>
  <desc id="desc">展示用户订单列表查询通过联合索引范围扫描、按索引顺序返回并应用 LIMIT 的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 32px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#64748B}
      .box{fill:#fff;stroke:#CBD5E1;stroke-width:1.5;filter:url(#shadow)}.hot{fill:#EFF6FF;stroke:#93C5FD}.store{fill:#FFF7ED;stroke:#FDBA74}.warn{fill:#FEF2F2;stroke:#FCA5A5}
      .h{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#0F172A}.t{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#475569}.n{font:700 14px Arial,sans-serif;fill:#2563EB}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.note{fill:#F8FAFC;stroke:#E2E8F0}
    </style>
  </defs>
  <rect width="1280" height="680" rx="28" fill="#F8FAFC"/>
  <text x="640" y="54" text-anchor="middle" class="title">范围查询、排序与分页：用户订单列表</text>
  <text x="640" y="84" text-anchor="middle" class="sub">理想路径是用 `(user_id, created_at)` 同时完成过滤和排序，并尽早被 LIMIT 截断</text>

  <rect x="70" y="130" width="150" height="90" rx="16" class="box"/><text x="145" y="165" text-anchor="middle" class="h">Client</text><text x="145" y="193" text-anchor="middle" class="t">列表查询</text>
  <rect x="260" y="130" width="150" height="90" rx="16" class="box"/><text x="335" y="165" text-anchor="middle" class="h">Server</text><text x="335" y="193" text-anchor="middle" class="t">解析优化</text>
  <rect x="450" y="130" width="170" height="90" rx="16" class="hot"/><text x="535" y="165" text-anchor="middle" class="h">Optimizer</text><text x="535" y="193" text-anchor="middle" class="t">选 idx_user_created</text>
  <rect x="660" y="130" width="155" height="90" rx="16" class="store"/><text x="738" y="165" text-anchor="middle" class="h">范围扫描</text><text x="738" y="193" text-anchor="middle" class="t">user_id=1001</text>
  <rect x="855" y="130" width="155" height="90" rx="16" class="store"/><text x="933" y="165" text-anchor="middle" class="h">按索引顺序</text><text x="933" y="193" text-anchor="middle" class="t">created_at DESC</text>
  <rect x="1050" y="130" width="155" height="90" rx="16" class="hot"/><text x="1128" y="165" text-anchor="middle" class="h">LIMIT 20</text><text x="1128" y="193" text-anchor="middle" class="t">提前停止</text>
  <rect x="450" y="275" width="755" height="78" rx="16" class="warn"/><text x="828" y="307" text-anchor="middle" class="h">无合适索引时</text><text x="828" y="333" text-anchor="middle" class="t">扫描大量订单 -> Server 层 filesort -> 丢弃 OFFSET 前的数据 -> 返回少量结果</text>

  <path d="M220 175H260" class="line"/><path d="M410 175H450" class="line"/><path d="M620 175H660" class="line"/><path d="M815 175H855" class="line"/><path d="M1010 175H1050" class="line"/>

  <rect x="115" y="395" width="1050" height="180" rx="22" class="note"/>
  <text x="160" y="438" class="n">1</text><text x="185" y="438" class="t">联合索引先定位 `user_id = 1001` 的范围，再利用 `created_at` 的有序性返回最新订单。</text>
  <text x="160" y="473" class="n">2</text><text x="185" y="473" class="t">如果返回字段不在索引中，仍需要根据主键回表读取订单字段。</text>
  <text x="160" y="508" class="n">3</text><text x="185" y="508" class="t">`LIMIT 20` 可以让扫描提前停止；深分页会让 MySQL 跳过大量无用行。</text>
  <text x="160" y="543" class="n">4</text><text x="185" y="543" class="t">没有合适索引时，排序和分页会转移到 Server 层，容易出现 `Using filesort`。</text>
  <text x="640" y="625" text-anchor="middle" class="sub">性能关注：联合索引顺序、回表次数、Using filesort、深分页、返回字段数量</text>
</svg>
